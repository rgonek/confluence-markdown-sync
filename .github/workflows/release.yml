name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0

  build-artifacts:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          output="dist/conf-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w -X github.com/rgonek/confluence-markdown-sync/cmd.Version=${{ github.ref_name }}" -o "$output" ./cmd/conf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: conf-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/conf-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  package-release:
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: conf-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum conf-* > checksums.txt

      - name: Install Syft
        uses: anchore/actions/setup-syft@v0

      - name: Generate SBOM files
        run: |
          for binary in dist/conf-*; do
            syft "${binary}" -o spdx-json="${binary}.sbom.spdx.json"
          done

      - name: Vulnerability scan artifacts
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: dist
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign checksums (keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: conf-release-bundle
          path: |
            dist/conf-*
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem

  publish:
    needs: package-release
    runs-on: ubuntu-latest
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: conf-release-bundle
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/conf-*
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
