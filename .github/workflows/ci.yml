name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -trimpath ./cmd/conf

      - name: Test
        run: go test -race ./...

      - name: Coverage gates
        if: matrix.os == 'ubuntu-latest'
        run: go run ./tools/coveragecheck

      - name: Check formatting
        run: go run ./tools/gofmtcheck

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
